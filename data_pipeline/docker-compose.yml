version: "3.8"

services:
  ingest:
    build: .
    image: mealie-data
    container_name: mealie-data-ingest
    env_file:
      - .env
    command: ["python", "ingest_baseline.py"]
    volumes:
      - ./local_data:/app/local_data

  generator:
    image: mealie-data
    container_name: mealie-data-generator
    depends_on:
      ingest:
        condition: service_completed_successfully
    env_file:
      - .env
    command: ["python", "-c", "import generator; generator.run_generator(duration_minutes=0)"]
    volumes:
      - ./local_data:/app/local_data

  batch:
    image: mealie-data
    container_name: mealie-data-batch
    depends_on:
      ingest:
        condition: service_completed_successfully
    env_file:
      - .env
    command: ["sh", "-c", "while true; do python batch_pipeline.py; sleep 3600; done"]
    volumes:
      - ./local_data:/app/local_data
