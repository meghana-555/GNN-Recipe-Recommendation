# Assisted by Claude

services:

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  batch:
    build: ./batch
    volumes:
      - ./data:/data
      - ./models:/models
      - ./logs:/logs
    environment:
      MODEL_PATH: /models/recipe_gnn_model.pt
      DATA_DIR: /data
      CACHE_BACKEND: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      TOP_N: 10
      RECIPE_METADATA_OUTPUT: /data/recipe_metadata.json
      RECOMMENDATIONS_OUTPUT: /data/recommendations.json
      BATCH_RUN_LOG: /logs/batch_run.jsonl
      MLFLOW_TRACKING_URI: ""
      KAGGLE_USERNAME: ""
      KAGGLE_KEY: ""
    depends_on:
      redis:
        condition: service_healthy

  api:
    build: ./api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
      - ./logs:/logs
    environment:
      CACHE_BACKEND: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RECIPE_METADATA_PATH: /data/recipe_metadata.json
      RECOMMENDATIONS_PATH: /data/recommendations.json
      LOG_DIR: /logs
      PORT: 8000
      MONITOR_URL: http://monitor:9090
      FEEDBACK_LOG_PATH: /logs/feedback.jsonl
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  api-memory:
    build: ./api
    ports:
      - "8001:8000"
    volumes:
      - ./data:/data
      - ./logs:/logs
    environment:
      CACHE_BACKEND: memory
      RECIPE_METADATA_PATH: /data/recipe_metadata.json
      RECOMMENDATIONS_PATH: /data/recommendations.json
      LOG_DIR: /logs
      PORT: 8000
      MONITOR_URL: http://monitor:9090
      FEEDBACK_LOG_PATH: /logs/feedback.jsonl
    restart: unless-stopped

  evaluation:
    build: ./evaluation
    volumes:
      - ./results:/results
    environment:
      BASELINE_URL: http://api-memory:8000
      OPTIMIZED_URL: http://api:8000
      BENCHMARK_DURATION: 30
      USER_POOL_SIZE: 1000
      OUTPUT_DIR: /results
    depends_on:
      - api
      - api-memory

  monitor:
    build: ./monitoring
    ports:
      - "9090:9090"
    volumes:
      - ./logs:/logs
      - ./models:/models
    environment:
      FEEDBACK_LOG_PATH: /logs/feedback.jsonl
      SERVING_LOG_PATH: /logs/serving.log
      DECISIONS_LOG_PATH: /logs/decisions.jsonl
      MODEL_VERSION_PATH: /models/current_version.txt
      REDIS_HOST: redis
      REDIS_PORT: 6379
      EXPECTED_USER_COUNT: "0"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/metrics"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  rollback:
    build: ./rollback
    volumes:
      - ./models:/models
    profiles:
      - tools
